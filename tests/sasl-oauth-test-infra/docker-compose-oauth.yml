# Docker Compose for OAUTHBEARER (unsecured JWT) Kafka testing.
#
# One broker, one SASL_PLAINTEXT listener on port 9097, enabling only
# OAUTHBEARER. The broker runs Apache Kafka's bundled unsecured-JWS
# validator — it trusts any JWT with `alg: none` whose `sub` claim
# matches the whitelist configured in JAAS. This is the canonical
# test-mode that Apache documents for OAUTHBEARER, exercised by the
# `StaticOAuthBearerPlugin` fixture in `sasl_test_fixtures.rs`.
#
# Prerequisites:
#   docker-compose -f docker-compose-oauth.yml up -d
#
# Credentials:
#   OAUTHBEARER: test-user (unsecured JWT, see fixture)
#
# Inter-broker traffic uses a separate PLAINTEXT INTERNAL listener so
# the broker can bootstrap without needing its own OAUTHBEARER token.

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: zookeeper-oauth-test
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22182:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka-oauth:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka-oauth-test
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9097:9097"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,SASL:SASL_PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,SASL://0.0.0.0:9097
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-oauth:9092,SASL://localhost:9097
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_SASL_ENABLED_MECHANISMS: OAUTHBEARER
      # Listener-scoped callback handler; omitting this would make the
      # broker require a secured JWT validator plugin.
      KAFKA_LISTENER_NAME_SASL_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: "org.apache.kafka.common.security.oauthbearer.internals.unsecured.OAuthBearerUnsecuredValidatorCallbackHandler"
      # Listener-scoped inline JAAS — avoids setting
      # java.security.auth.login.config at the JVM level, which would
      # make the cp-kafka preflight ZK client try SASL auth and hang.
      KAFKA_LISTENER_NAME_SASL_OAUTHBEARER_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required unsecuredLoginStringClaim_sub="broker-self";'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9097"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
