// JAAS config for the OAUTHBEARER test broker.
//
// `unsecuredLoginStringClaim_sub` is the broker's own identity when it
// acts as a client (none of this repo's tests exercise that path, but
// cp-kafka's startup scripts check the module loads cleanly).
//
// The listener's sasl.server.callback.handler.class (set via the
// KAFKA_LISTENER_NAME_SASL_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS
// env var in docker-compose-oauth.yml) handles inbound client tokens —
// it accepts any unsecured JWT whose `alg` is `none`. Client-side
// `sub` claims are not whitelisted; any token parses and authenticates.

KafkaServer {
    org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required
    unsecuredLoginStringClaim_sub="broker-self";
};

KafkaClient {
    org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required
    unsecuredLoginStringClaim_sub="test-user";
};
