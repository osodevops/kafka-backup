// JAAS config for the SASL test broker.
//
// - KafkaServer: the broker's own config. PlainLoginModule declares the
//   PLAIN users the broker will accept. SCRAM users don't belong here —
//   they live in Kafka/ZK metadata and are seeded by the scram-init service.
// - KafkaClient: used by Kafka's internal admin tools inside the container,
//   not by kafka-backup-core's client (which builds SASL frames manually).

KafkaServer {
    org.apache.kafka.common.security.plain.PlainLoginModule required
    username="alice"
    password="alice-secret"
    user_alice="alice-secret";

    org.apache.kafka.common.security.scram.ScramLoginModule required;
};

KafkaClient {
    org.apache.kafka.common.security.plain.PlainLoginModule required
    username="alice"
    password="alice-secret";
};
